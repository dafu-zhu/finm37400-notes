format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark:  [darkly, styles/custom.scss]
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: true
    code-copy: true
    smooth-scroll: true
    citations-hover: true
    html-math-method:
      method: katex
      url: "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/"
    include-in-header:
      - text: |
          <script>
            window.MathJax = window.MathJax || {};
            window.katexMacros = {
              "\\R":  "\\mathbb{R}",
              "\\N":  "\\mathbb{N}",
              "\\Z":  "\\mathbb{Z}",
              "\\Q":  "\\mathbb{Q}",
              "\\C":  "\\mathbb{C}",
              "\\E":  "\\mathbb{E}",
              "\\P":  "\\mathbb{P}",
              "\\cA": "\\mathcal{A}", "\\cB": "\\mathcal{B}",
              "\\cC": "\\mathcal{C}", "\\cD": "\\mathcal{D}",
              "\\cF": "\\mathcal{F}", "\\cG": "\\mathcal{G}",
              "\\cH": "\\mathcal{H}", "\\cL": "\\mathcal{L}",
              "\\cM": "\\mathcal{M}", "\\cN": "\\mathcal{N}",
              "\\cO": "\\mathcal{O}", "\\cP": "\\mathcal{P}",
              "\\cS": "\\mathcal{S}", "\\cT": "\\mathcal{T}",
              "\\cX": "\\mathcal{X}",
              "\\Var":  "\\operatorname{Var}",
              "\\Cov":  "\\operatorname{Cov}",
              "\\Corr": "\\operatorname{Corr}",
              "\\Tr":   "\\operatorname{Tr}",
              "\\rank": "\\operatorname{rank}",
              "\\diag": "\\operatorname{diag}",
              "\\sgn":  "\\operatorname{sgn}",
              "\\argmax": "\\operatorname*{arg\\,max}",
              "\\argmin": "\\operatorname*{arg\\,min}",
              "\\abs":   "\\left|#1\\right|",
              "\\norm":  "\\left\\|#1\\right\\|",
              "\\inner": "\\left\\langle#1,#2\\right\\rangle",
              "\\set":   "\\left\\{#1\\right\\}",
              "\\floor": "\\left\\lfloor#1\\right\\rfloor",
              "\\ceil":  "\\left\\lceil#1\\right\\rceil",
              "\\dd":    "\\,\\mathrm{d}",
              "\\dv":    "\\frac{\\mathrm{d}#1}{\\mathrm{d}#2}",
              "\\pdv":   "\\frac{\\partial #1}{\\partial #2}",
              "\\given": "\\,|\\,",
              "\\iid":   "\\stackrel{\\text{iid}}{\\sim}",
              "\\indep": "\\perp\\!\\!\\!\\perp",
              "\\bm":    "\\boldsymbol{#1}"
            };
          </script>
    include-after-body:
      - text: |
          <script>
            document.addEventListener("DOMContentLoaded", function () {
              if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                  delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$",  right: "$",  display: false},
                    {left: "\\(", right: "\\)", display: false},
                    {left: "\\[", right: "\\]", display: true}
                  ],
                  macros: window.katexMacros,
                  throwOnError: false,
                  trust: true,
                  strict: false
                });
              }
            });
          </script>

bibliography: references.bib
